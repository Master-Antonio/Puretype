[General]
; Panel subpixel layout: WRGB (LG WOLED) or QD_OLED_TRIANGLE (Samsung QD-OLED)
PanelType=QD_OLED_TRIANGLE

; Filter intensity multiplier: 0.0 = passthrough (disabled), 1.0 = full filtering
FilterStrength=1.0

; Fine-tuning exponent applied ON TOP of the sRGB transfer function.
; 1.0 = pure IEC 61966-2-1 sRGB (recommended). Values > 1.0 darken midtones.
Gamma=1.0

; Stem Darkening: restores typographic weight lost when ClearType RGB is removed.
; Thin strokes are selectively boosted, thick stems are left untouched. (macOS-style)
StemDarkeningEnabled=true
StemDarkeningStrength=0.4

[Debug]
; Enable debug logging to file
Enabled=false

; Log file path (relative to DLL location)
LogFile=PURETYPE.log

; Tint custom-rendered glyphs with a color overlay so you can confirm interception
HighlightRenderedGlyphs=false
