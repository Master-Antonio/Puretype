; ============================================================
;  puretype.ini — PureType OLED subpixel renderer settings
;  Edit this file and restart the injected process to apply.
;  All numeric ranges are enforced in config.cpp.
; ============================================================

[general]

; Panel type. Choose ONE of:
;   rwbg            — LG WOLED panels (most LG C/G/B OLED TVs, older monitors)
;   rgwb            — LG WOLED panels with swapped W/B column order (e.g., modern LG 32")
;   qd_oled_gen1    — Samsung QD-OLED Gen 1/2 panels (AW3423DW/DWF, Odyssey G8 34")
;   qd_oled_gen3    — Samsung QD-OLED Gen 3 panels (Dell AW2725DF, Odyssey 27/32" 4K)
;   qd_oled_gen4    — Samsung QD-OLED Gen 4 panels
panelType = qd_oled_gen3

; Gamma correction for the rasterization pass.
;   srgb — Standard sRGB curve (IEC 61966-2-1). Perfect for LCD monitors.
;   oled — Softer gamma (~2.0) below 18% brightness. Adjusts for OLED's steep
;          shadow response to prevent dark text from being crushed.
gammaMode = oled

; Subpixel filter strength. Range [0.0, 5.0].
; 1.0 = full panel-aware filtering. 0.0 = passthrough.
filterStrength = 1.00

; Base Gamma multiplier. Range [0.5, 3.0].
; 1.0 = no correction beyond what's defined in GammaMode.
gamma = 1.0

; OLED gamma output correction. Range [1.0, 2.0].
; Fine-tunes how dark text is rendered on OLED panels.
; Higher values brighten dark-on-light text.
oledGammaOutput = 1.00

; Enable FreeType subpixel hinting (FT_LOAD_FORCE_AUTOHINT).
; true  = crisper stems at small sizes (recommended for OLED).
enableSubpixelHinting = true

; Enable fractional glyph positioning (sub-pixel X placement).
; false = recommended for GDI apps. Post-hoc interpolation blurs masks.
; DWrite path uses native FreeType phase tracking regardless of this setting.
enableFractionalPositioning = false

; DPI-Aware Graduated Fade-Out Thresholds.
; High DPI screens don't need subpixel filtering. Between Low and High,
; the filtering strength and chroma preservation gradually ramp down.
; Above High, filtering is disabled for perfect native scaling.
highDpiThresholdLow = 144.0
highDpiThresholdHigh = 216.0

; LOD (level-of-detail) thresholds in pixels.
lodThresholdSmall = 10.0
lodThresholdLarge = 22.0

; WOLED white-subpixel cross-talk reduction. Range [0.0, 1.0].
; Applies ONLY to RWBG/RGWB panels. Reduces color fringing by stealing
; energy from RGB where the physical White subpixel lights up.
; 0.00 = off. 0.08 = mild correction. 0.15 = aggressive.
woledCrossTalkReduction = 0.08

; Luma contrast boost multiplier. Range [1.0, 3.0].
; Controls S-curve exponent: exp ≈ 1.0 + (value - 1.0) × 0.5.
; 1.20 = optimal 5-7% mid-tone boost (Legge & Foley 1980).
lumaContrastStrength = 1.20

; Stem darkening: automatically darkens thin vertical strokes.
; Uses font-weight-aware darkening (less for Bold, more for Light fonts).
; 0.45 = consistent with FreeType/Apple defaults for OLED at 96-110 DPI.
stemDarkeningEnabled = true
stemDarkeningStrength = 0.45

; Inter variable font axis settings (used when Inter is set as system font).
; interFontWeight: [100, 900]. WOLED: try 410-420. QD-OLED: 400 is fine.
interFontWeight = 400
; interOpticalSize: [14, 32]. QD-OLED: increase for better clarity.
interOpticalSize = 18
; interLetterSpacing: [-2.0, 4.0] px. QD-OLED: 0.2-0.5 reduces fringing.
interLetterSpacing = 0.3

; Auto-check for updates on startup via GitHub Releases API.
; true = check automatically. false = manual check only from Info page.
autoCheckUpdates = true

; ============================================================
[debug]
; ============================================================

; Enable debug logging to a file.
enabled = false

; Log file path relative to the DLL directory.
logFile = PURETYPE.log

; Tint every PureType-rendered glyph with a slight cyan overlay.
highlightRenderedGlyphs = false
