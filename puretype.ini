; ============================================================
;  puretype.ini — PureType OLED subpixel renderer settings
;  Edit this file and restart the injected process to apply.
;  All numeric ranges are enforced in config.cpp.
; ============================================================

[general]

; Panel type. Choose ONE of:
;   rwbg            — LG WOLED panels (most LG C/G/B OLED TVs used as monitors,
;                     LG UltraGear OLED 27GR95QE, 45GR95QE etc.)
;   rgwb            — LG WOLED panels with swapped W/B column order
;                     (some LG 32" models, check your panel spec sheet)
;   qd_oled_triangle — Samsung QD-OLED panels (Dell AW3423DW/AW3423DWF,
;                     Samsung Odyssey G8 OLED, Sony InZone M9 II etc.)
panelType = rwbg

; Subpixel filter strength. Range [0.0, 5.0].
; 1.0 = full panel-aware filtering.
; 0.0 = passthrough (PureType renders nothing, stock GDI/DWrite used).
; 0.75 gives cleaner edges on thin strokes without visible halos.
filterStrength = 0.75

; Gamma correction for the rasterization pass. Range [0.5, 3.0].
; 1.0 = no correction (correct for sRGB monitors and Windows default gamma).
; Do not change unless your display has unusual gamma calibration.
gamma = 1.0

; Enable FreeType subpixel hinting (FT_LOAD_FORCE_AUTOHINT).
; true  = crisper stems at small sizes (recommended for OLED).
; false = font designer's original hints, may look softer at ≤14 px.
enableSubpixelHinting = true

; Enable fractional glyph positioning (sub-pixel X placement).
; true  = glyphs placed at the nearest subpixel boundary — sharper.
; false = integer-pixel placement — matches legacy GDI behaviour.
enableFractionalPositioning = true

; LOD (level-of-detail) thresholds in pixels.
; Below lodThresholdSmall:  small-text rasterization path.
; Above lodThresholdLarge:  large-text / heading path.
; Range: lodSmall in [6, 96], lodLarge in [lodSmall+1, 160].
lodThresholdSmall = 10.0
lodThresholdLarge = 22.0

; WOLED white-subpixel cross-talk reduction. Range [0.0, 1.0].
; Applies ONLY to RWBG/RGWB panels (LG WOLED).
; The W subpixel drives R+G+B simultaneously via the TCON; at non-zero
; values the W channel is attenuated before the max() merge so colour
; channels dominate edge contrast.
; 0.00 = no correction (original behaviour, ignores this parameter).
; 0.08 = 8% attenuation — reduces grey haze on dark backgrounds.
; 0.15 = 15% — more aggressive, good for very dark UI themes.
woledCrossTalkReduction = 0.08

; Luma contrast boost multiplier. Range [1.0, 3.0].
; 1.0  = no boost.
; 1.15 = gentle boost — improves legibility on glossy OLED surfaces.
; 1.30 = strong boost — useful if your panel's black level is elevated.
lumaContrastStrength = 1.15

; Stem darkening: slightly darken thin vertical strokes.
; Compensates for OLED's higher contrast ratio making thin stems look
; lighter than intended at small sizes.
stemDarkeningEnabled = true

; Stem darkening strength. No enforced range — defaults to 0.25.
; 0.0 = off (same as stemDarkeningEnabled = false).
; 0.25 = mild darkening (recommended).
; 0.5  = strong — visible effect on fonts with very thin hairlines.
stemDarkeningStrength = 0.25

; ============================================================
[debug]
; ============================================================

; Enable debug logging to a file. Set to true only when diagnosing
; rendering issues — logging has measurable overhead on fast typists.
enabled = false

; Log file path relative to the DLL directory.
logFile = PURETYPE.log

; Tint every PureType-rendered glyph with a slight cyan overlay.
; Useful to verify which glyphs are being intercepted vs passed through.
highlightRenderedGlyphs = false
